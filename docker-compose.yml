services:
  map:
    build: .
    ports:
      - "8080:80"
    volumes:
      - map_data:/usr/share/nginx/html/data
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      CITIES_PATH: /data/cities.json
    volumes:
      - map_data:/data
    restart: unless-stopped

volumes:
  map_data:
